    <!-- L3-L4: headline -->
    <text x="60" y="100" fill="#F8F8F2">Software Engineer @ Jobsity (Hibu)</text>
    <text x="60" y="120" fill="#F8F8F2">Brasília, BR · Remote · Shipping since 2020</text>

    <!-- L6-L8: About header -->
    <text x="60" y="160" fill="#49483e">─────────────────────────────────────────────</text>
    <text x="60" y="180"><tspan fill="#F92672">##</tspan><tspan fill="#F8F8F2"> About</tspan></text>
    <text x="60" y="200" fill="#49483e">─────────────────────────────────────────────</text>

    <!-- L10-L14: paragraph 1 -->
    <text x="60" y="240" fill="#F8F8F2">Frontend-leaning full-stack engineer with 5+ years</text>
    <text x="60" y="260" fill="#F8F8F2">shipping production software across web, mobile and</text>
    <text x="60" y="280" fill="#F8F8F2">e-commerce stacks. Comfortable end-to-end on React /</text>
    <text x="60" y="300" fill="#F8F8F2">React Native / Next.js, Node.js / NestJS, with</text>
    <text x="60" y="320" fill="#F8F8F2">TypeScript as the default everywhere.</text>

    <!-- L16-L19: paragraph 2 -->
    <text x="60" y="360" fill="#F8F8F2">Day-to-day involves GraphQL / REST APIs, AWS infra,</text>
    <text x="60" y="380" fill="#F8F8F2">Datadog observability, Auth0, automated testing with</text>
    <text x="60" y="400" fill="#F8F8F2">Jest + RTL, and integrating AI tooling (Claude Code,</text>
    <text x="60" y="420" fill="#F8F8F2">Copilot) into the engineering workflow.</text>

    <!-- L21-L23: paragraph 3 -->
    <text x="60" y="460" fill="#F8F8F2">Past work spans fintech, e-commerce (VTEX IO / FastStore),</text>
    <text x="60" y="480" fill="#F8F8F2">healthcare and logistics — from greenfield apps to</text>
    <text x="60" y="500" fill="#F8F8F2">legacy migrations and large-scale refactors.</text>

    <!-- L25-L27: Stack header -->
